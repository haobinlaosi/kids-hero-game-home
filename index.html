<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="任务乐园">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <title>宝贝任务乐园</title>
  <link rel="stylesheet" href="style.css?v=26">
</head>
<body>

  <!-- ========== 认证页（登录/注册/重置）========== -->
  <div id="page-auth" class="page">
    <div class="auth-container">
      <div class="auth-header">
        <h1>&#127873; 宝贝任务乐园</h1>
        <p class="auth-subtitle">请先登录或注册</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="app.switchAuthTab('login')">登录</button>
        <button class="auth-tab" data-tab="register" onclick="app.switchAuthTab('register')">注册</button>
        <button class="auth-tab" data-tab="reset" onclick="app.switchAuthTab('reset')">忘记密码</button>
      </div>
      <div class="auth-form" id="auth-form"></div>
      <div class="auth-footer">
        <a class="auth-diag-link" onclick="app.runDiagnostics()">&#128269; 注册/登录有问题？点这里网络诊断</a>
      </div>
    </div>
  </div>

  <!-- ========== 网络诊断弹窗 ========== -->
  <div id="diag-modal" class="modal">
    <div class="modal-content modal-diag">
      <h3>&#128269; 网络诊断</h3>
      <div class="diag-body" id="diag-body"></div>
      <div class="diag-actions">
        <button class="btn btn-cancel" onclick="app.closeDiag()">关闭</button>
        <button class="btn btn-confirm" id="diag-copy">&#128203; 复制结果</button>
      </div>
    </div>
  </div>

  <!-- ========== 首页 ========== -->
  <div id="page-home" class="page active">
    <div class="home-header">
      <span id="sync-indicator" class="sync-indicator"></span>
      <div class="points-display"><span class="star-icon">&#9733;</span> <span class="pts-val">0</span> 积分</div>
      <button id="logout-btn" class="logout-btn" onclick="app.logout()" title="退出登录">&#9211;</button>
    </div>
    <div class="character-stage" id="home-character-stage"></div>
    <div class="character-name" id="home-character-name"></div>
    <div class="character-switch">
      <button class="btn btn-small btn-switch" onclick="app.switchCharacter()">切换角色</button>
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn" onclick="app.goToPage('task')"><span class="nav-icon">&#9998;</span><span>任务</span></button>
      <button class="nav-btn" onclick="app.goToPage('house')"><span class="nav-icon">&#127968;</span><span>小屋</span></button>
      <button class="nav-btn" onclick="app.goToPage('battle')"><span class="nav-icon">&#9876;</span><span>打怪兽</span></button>
    </nav>
  </div>

  <!-- ========== 任务页 ========== -->
  <div id="page-task" class="page">
    <div class="page-header">
      <button class="btn-back" onclick="app.goToPage('home')">&#8592;</button>
      <h2>任务清单</h2>
      <button class="btn-manage-task" onclick="app.manageTasksPin()">&#9881;</button>
      <div class="points-display points-small"><span class="star-icon">&#9733;</span> <span class="pts-val">0</span></div>
    </div>
    <div class="task-list" id="task-list"></div>
    <div class="today-history"><h3>今日完成</h3><div id="today-list"></div></div>
  </div>

  <!-- ========== 小屋页 ========== -->
  <div id="page-house" class="page">
    <div class="page-header">
      <button class="btn-back" onclick="app.goToPage('home')">&#8592;</button>
      <h2 id="house-title">小屋</h2>
      <div class="points-display points-small"><span class="star-icon">&#9733;</span> <span class="pts-val">0</span></div>
    </div>
    <!-- 房间 -->
    <div class="room">
      <!-- 墙壁 -->
      <div class="room-wall" id="room-wall">
        <div class="room-wall-light"></div>
        <div class="room-curtain-left"></div>
        <div class="room-curtain-right"></div>
        <div class="room-wall-decor" id="room-wall-decor"></div>
        <div class="room-trophies" id="room-trophies"></div>
        <div class="room-window">&#127749;</div>
      </div>
      <!-- 地板 -->
      <div class="room-floor" id="room-floor">
        <div class="room-special" id="room-special"></div>
        <div class="room-center">
          <div class="room-character" id="room-character"></div>
        </div>
        <div class="room-pets-row" id="room-pets-row"></div>
        <div class="room-furniture" id="room-furniture"></div>
      </div>
    </div>
    <div class="house-buttons">
      <button class="btn btn-small btn-switch" onclick="app.switchHouseCharacter()">切换小屋</button>
      <button class="btn btn-small" onclick="app.showFloorPicker()" style="background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff">🎨 换装</button>
      <button class="btn btn-small" onclick="app.showPetList()" style="background:linear-gradient(135deg,#55efc4,#00b894);color:#fff">🐾 宠物</button>
      <button class="btn btn-small btn-confirm" onclick="app.goToPage('shop')">&#127873; 商店</button>
    </div>
  </div>

  <!-- ========== 商店页 ========== -->
  <div id="page-shop" class="page">
    <div class="page-header">
      <button class="btn-back" onclick="app.goToPage('house')">&#8592;</button>
      <h2>装饰商店</h2>
      <div class="points-display points-small"><span class="star-icon">&#9733;</span> <span class="pts-val">0</span></div>
    </div>
    <div class="shop-tabs" id="shop-tabs"></div>
    <div class="shop-grid" id="shop-grid"></div>
  </div>

  <!-- ========== 打怪兽页 ========== -->
  <div id="page-battle" class="page">
    <div class="page-header">
      <button class="btn-back" onclick="app.goToPage('home')">&#8592;</button>
      <h2>打怪兽</h2>
      <div class="points-display points-small"><span class="star-icon">&#9733;</span> <span class="pts-val">0</span></div>
    </div>
    <div id="battle-area">
      <div class="battle-monster" id="battle-monster">
        <div class="monster-name" id="monster-name"></div>
        <div class="monster-icon" id="monster-icon"></div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="monster-hp-bar"></div></div>
        <div class="hp-text" id="monster-hp-text"></div>
      </div>
      <div class="battle-vs">VS</div>
      <div class="battle-hero" id="battle-hero"></div>
      <div class="battle-actions" id="battle-actions"></div>
      <div id="pet-actions"></div>
      <div class="battle-log" id="battle-log"></div>
    </div>
  </div>

  <!-- ========== 宠物培养页 ========== -->
  <div id="page-pet" class="page">
    <div class="page-header">
      <button class="btn-back" onclick="app.goToPage('house')">&#8592;</button>
      <h2 id="pet-nurture-title">宠物</h2>
      <div class="points-display points-small"><span class="star-icon">&#9733;</span> <span class="pts-val">0</span></div>
    </div>
    <div class="pet-nurture-area">
      <div class="pet-display-stage" id="pet-display-stage">
        <div class="pet-emoji-display" id="pet-emoji-display"></div>
        <div class="pet-anim-layer" id="pet-anim-layer"></div>
      </div>
      <div class="pet-mood-text" id="pet-mood-text"></div>
      <div class="pet-stats" id="pet-stats"></div>
      <div class="pet-nurture-actions" id="pet-nurture-actions"></div>
    </div>
  </div>

  <!-- ========== 弹窗 ========== -->
  <div id="pin-modal" class="modal">
    <div class="modal-content">
      <h3 id="pin-title">请输入家长密码</h3>
      <div class="pin-display" id="pin-display">
        <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="app.pinInput(1)">1</button>
        <button class="pin-btn" onclick="app.pinInput(2)">2</button>
        <button class="pin-btn" onclick="app.pinInput(3)">3</button>
        <button class="pin-btn" onclick="app.pinInput(4)">4</button>
        <button class="pin-btn" onclick="app.pinInput(5)">5</button>
        <button class="pin-btn" onclick="app.pinInput(6)">6</button>
        <button class="pin-btn" onclick="app.pinInput(7)">7</button>
        <button class="pin-btn" onclick="app.pinInput(8)">8</button>
        <button class="pin-btn" onclick="app.pinInput(9)">9</button>
        <button class="pin-btn pin-btn-empty"></button>
        <button class="pin-btn" onclick="app.pinInput(0)">0</button>
        <button class="pin-btn pin-btn-del" onclick="app.pinDelete()">&#9003;</button>
      </div>
      <button class="btn btn-cancel" onclick="app.closePin()">取消</button>
    </div>
  </div>

  <div id="buy-modal" class="modal">
    <div class="modal-content modal-buy">
      <div class="buy-preview" id="buy-preview"></div>
      <p class="buy-name" id="buy-name"></p>
      <p class="buy-price"><span class="star-icon">&#9733;</span> <span id="buy-price-num"></span> 积分</p>
      <div class="buy-actions">
        <button class="btn btn-cancel" onclick="app.closeBuy()">不要了</button>
        <button class="btn btn-confirm" onclick="app.confirmBuy()">买！</button>
      </div>
    </div>
  </div>

  <div id="victory-modal" class="modal">
    <div class="modal-content">
      <div style="font-size:60px;margin-bottom:10px">&#127881;</div>
      <h3 style="font-size:22px;color:#FF6B6B;margin-bottom:8px">怪兽被打败啦！</h3>
      <p id="victory-text" style="font-size:16px;color:#666;margin-bottom:20px"></p>
      <button class="btn btn-confirm" onclick="app.closeVictory()">太棒了！</button>
    </div>
  </div>

  <!-- GIF动画弹窗 -->
  <div id="gif-modal" class="modal">
    <div class="modal-content modal-gif" onclick="app.closeGif()">
      <img id="gif-image" src="" alt="动画">
      <p id="gif-text" class="gif-text"></p>
    </div>
  </div>

  <!-- 宠物列表弹窗 -->
  <div id="pet-list-modal" class="modal">
    <div class="modal-content modal-pet-list">
      <h3 style="font-size:20px;margin-bottom:12px">🐾 我的宠物</h3>
      <div id="pet-list-grid"></div>
      <button class="btn btn-cancel" style="margin-top:12px;width:100%" onclick="app.closePetList()">关闭</button>
    </div>
  </div>

  <!-- 怪兽墙弹窗 -->
  <div id="trophy-wall-modal" class="modal">
    <div class="modal-content modal-trophy-wall">
      <h3 style="font-size:22px;margin-bottom:12px">🏆 怪兽墙</h3>
      <p class="trophy-wall-subtitle" id="trophy-wall-subtitle"></p>
      <div class="trophy-wall-grid" id="trophy-wall-grid"></div>
      <button class="btn btn-cancel" style="margin-top:12px;width:100%" onclick="app.closeTrophyWall()">关闭</button>
    </div>
  </div>

  <!-- 换装弹窗 -->
  <div id="floor-picker-modal" class="modal">
    <div class="modal-content modal-floor-picker">
      <h3 style="font-size:22px;margin-bottom:12px">🎨 更换地板墙纸</h3>
      <div class="floor-picker-grid" id="floor-picker-grid"></div>
      <button class="btn btn-cancel" style="margin-top:12px;width:100%" onclick="app.closeFloorPicker()">关闭</button>
    </div>
  </div>

  <!-- 任务管理弹窗 -->
  <div id="task-mgr-modal" class="modal">
    <div class="modal-content modal-task-mgr">
      <h3 style="font-size:22px;margin-bottom:12px">&#9881; 管理任务</h3>
      <div class="task-mgr-scroll" id="task-mgr-content"></div>
      <button class="btn btn-cancel" style="margin-top:12px;width:100%" onclick="app.closeTaskManager()">完成</button>
    </div>
  </div>

  <div id="celebration" class="celebration"></div>
  <button id="mute-btn" class="mute-btn" onclick="app.toggleMute()" title="背景音乐开关">🔊</button>
  <script src="app.js?v=26"></script>
</body>
</html>
